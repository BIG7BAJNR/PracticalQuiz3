<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; }

    #ui {
      position: fixed; top: 20px; left: 20px; z-index: 99; pointer-events: none;
    }
    #ui h1 {
      font-size: 20px; font-weight: 300; letter-spacing: 5px;
      text-transform: uppercase; color: #b8d4f8;
      text-shadow: 0 0 18px rgba(80,140,255,0.7);
    }
    #ui p { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); margin-top: 3px; }

    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 99; align-items: center; flex-wrap: wrap; justify-content: center;
    }
    #controls button {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
      color: #ddd; padding: 7px 16px; border-radius: 20px; cursor: pointer;
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
    }
    #controls button:hover { background: rgba(255,255,255,0.18); color: #fff; }
    #controls button.on { background: rgba(80,140,255,0.25); border-color: rgba(80,140,255,0.5); color: #8cbfff; }

    #speed-box {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
      padding: 5px 14px; border-radius: 20px;
    }
    #speed-box span { font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.45); text-transform: uppercase; }
    #speedSlider { width: 80px; accent-color: #5090ff; cursor: pointer; }

    #info-panel {
      position: fixed; top: 18px; right: 18px; z-index: 99;
      background: rgba(5,10,22,0.75); border: 1px solid rgba(100,160,255,0.18);
      backdrop-filter: blur(12px); border-radius: 14px;
      padding: 16px 20px; min-width: 210px; display: none; color: #fff;
    }
    #info-panel h2 { font-size: 17px; font-weight: 400; color: #88bbff; margin-bottom: 10px; }
    #info-panel .row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    #info-panel .row span:first-child { color: rgba(255,255,255,0.4); }
    #info-panel .row span:last-child  { color: rgba(255,255,255,0.85); }

    #tooltip {
      position: fixed; z-index: 99; pointer-events: none;
      background: rgba(5,10,22,0.8); border: 1px solid rgba(100,160,255,0.2);
      color: #aad0ff; font-size: 11px; letter-spacing: 1px; padding: 5px 10px;
      border-radius: 8px; display: none; text-transform: uppercase;
    }

    #hint {
      position: fixed; bottom: 62px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.25);
      text-transform: uppercase; z-index: 99; pointer-events: none; transition: opacity 1.5s;
    }
  </style>
</head>
<body>

<div id="ui">
  <h1>Solar System</h1>
  <p>Interactive 3D Simulation</p>
</div>

<div id="info-panel">
  <h2 id="ip-name">—</h2>
  <div class="row"><span>Order</span><span id="ip-order">—</span></div>
  <div class="row"><span>Orbital Period</span><span id="ip-period">—</span></div>
  <div class="row"><span>Distance from Sun</span><span id="ip-dist">—</span></div>
  <div class="row"><span>Diameter</span><span id="ip-diam">—</span></div>
</div>

<div id="tooltip"></div>

<div id="controls">
  <button id="btn-pause">⏸ Pause</button>
  <div id="speed-box">
    <span>Speed</span>
    <input type="range" id="speedSlider" min="0.1" max="8" step="0.1" value="1">
  </div>
  <button id="btn-top">Top View</button>
  <button id="btn-side">Side View</button>
  <button id="btn-orbits">Orbits On</button>
</div>

<div id="hint">Left-drag: rotate &nbsp;·&nbsp; Right-drag / scroll: zoom &nbsp;·&nbsp; Click planet for info</div>

<!-- Three.js r128 from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  Scene setup
// ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(0, 55, 120);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────
//  Lighting
// ─────────────────────────────────────────────
const sunLight = new THREE.PointLight(0xfff5cc, 3.5, 800, 1.8);
scene.add(sunLight);
const ambient = new THREE.AmbientLight(0x111828, 1);
scene.add(ambient);

// ─────────────────────────────────────────────
//  Texture loader
// ─────────────────────────────────────────────
const loader = new THREE.TextureLoader();
function tex(path) { return loader.load('texture/' + path); }

// ─────────────────────────────────────────────
//  Starfield background
// ─────────────────────────────────────────────
const starBg = new THREE.Mesh(
  new THREE.SphereGeometry(2000, 32, 32),
  new THREE.MeshBasicMaterial({ map: tex('2k_stars_milky_way.jpg'), side: THREE.BackSide })
);
scene.add(starBg);

// Extra star particles
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 3000; i++) {
  const r = 800 + Math.random() * 1000;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starVerts.push(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, transparent: true, opacity: 0.7 })));

// ─────────────────────────────────────────────
//  Sun
// ─────────────────────────────────────────────
const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(7, 64, 64),
  new THREE.MeshBasicMaterial({ map: tex('2k_sun.jpg') })
);
scene.add(sunMesh);

// Sun glow sprite using a canvas-generated glow texture
const glowCanvas = document.createElement('canvas');
glowCanvas.width = glowCanvas.height = 256;
const gc = glowCanvas.getContext('2d');
const grd = gc.createRadialGradient(128,128,10,128,128,128);
grd.addColorStop(0,   'rgba(255,210,80,0.6)');
grd.addColorStop(0.3, 'rgba(255,140,20,0.25)');
grd.addColorStop(1,   'rgba(255,80,0,0)');
gc.fillStyle = grd; gc.fillRect(0,0,256,256);
const glowTex = new THREE.CanvasTexture(glowCanvas);
const glowSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
glowSprite.scale.set(50, 50, 1);
scene.add(glowSprite);

// ─────────────────────────────────────────────
//  Orbit ring helper
// ─────────────────────────────────────────────
function makeOrbitRing(radius) {
  const pts = [];
  for (let i = 0; i <= 256; i++) {
    const a = (i / 256) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });
  return new THREE.LineLoop(geo, mat);
}

// ─────────────────────────────────────────────
//  Planet definitions
// ─────────────────────────────────────────────
//  orbitR  : distance from sun
//  radius  : sphere size
//  texFile : texture filename
//  orbitSpd: orbital speed (rad/s scaled) — Mercury fastest
//  axialSpd: self-rotation speed
//  tilt    : axial tilt degrees
const PLANET_DATA = [
  { name:'Mercury', orbitR:16,  radius:0.55, texFile:'2k_mercury.jpg',       orbitSpd:1.60, axialSpd:0.5,  tilt:0.03,  order:'1st', period:'88 days',      dist:'57.9M km',  diam:'4,879 km'  },
  { name:'Venus',   orbitR:23,  radius:0.92, texFile:'2k_venus_surface.jpg', orbitSpd:1.17, axialSpd:0.2,  tilt:177.4, order:'2nd', period:'225 days',     dist:'108M km',   diam:'12,104 km' },
  { name:'Earth',   orbitR:31,  radius:1.00, texFile:'2k_earth_daymap.jpg',  orbitSpd:1.00, axialSpd:1.2,  tilt:23.4,  order:'3rd', period:'365 days',     dist:'149.6M km', diam:'12,756 km' },
  { name:'Mars',    orbitR:40,  radius:0.70, texFile:'2k_mars.jpg',          orbitSpd:0.81, axialSpd:1.1,  tilt:25.2,  order:'4th', period:'687 days',     dist:'227.9M km', diam:'6,792 km'  },
  { name:'Jupiter', orbitR:60,  radius:3.20, texFile:'2k_jupiter.jpg',       orbitSpd:0.44, axialSpd:2.8,  tilt:3.1,   order:'5th', period:'11.9 years',   dist:'778.5M km', diam:'142,984 km'},
  { name:'Saturn',  orbitR:78,  radius:2.60, texFile:'2k_saturn.jpg',        orbitSpd:0.33, axialSpd:2.4,  tilt:26.7,  order:'6th', period:'29.5 years',   dist:'1.43B km',  diam:'120,536 km'},
  { name:'Uranus',  orbitR:96,  radius:1.80, texFile:'2k_uranus.jpg',        orbitSpd:0.23, axialSpd:1.4,  tilt:97.8,  order:'7th', period:'84 years',     dist:'2.87B km',  diam:'51,118 km' },
  { name:'Neptune', orbitR:114, radius:1.70, texFile:'2k_neptune.jpg',       orbitSpd:0.18, axialSpd:1.5,  tilt:28.3,  order:'8th', period:'165 years',    dist:'4.5B km',   diam:'49,528 km' },
];

const planetObjects = []; // { mesh, pivot, orbitRing, data, angle }
const clickTargets  = []; // meshes for raycasting

PLANET_DATA.forEach(d => {
  // Pivot (rotates around sun)
  const pivot = new THREE.Object3D();
  pivot.rotation.y = Math.random() * Math.PI * 2; // stagger start
  scene.add(pivot);

  // Planet mesh
  const geo  = new THREE.SphereGeometry(d.radius, 48, 48);
  const mat  = new THREE.MeshPhongMaterial({
    map:       loader.load('texture/' + d.texFile),
    specular:  new THREE.Color(0x222222),
    shininess: 12,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.x = d.orbitR;
  mesh.rotation.z = THREE.MathUtils.degToRad(d.tilt);
  mesh.userData = d;
  pivot.add(mesh);

  // Orbit ring
  const ring = makeOrbitRing(d.orbitR);
  scene.add(ring);

  planetObjects.push({ mesh, pivot, ring, data: d });
  clickTargets.push(mesh);
});

// ─────────────────────────────────────────────
//  Saturn rings
// ─────────────────────────────────────────────
const saturnObj = planetObjects[5]; // index 5 = Saturn
const ringTex   = loader.load('texture/2k_saturn_ring_alpha.png');

function makeSaturnRing(innerR, outerR, opacity) {
  const geo = new THREE.RingGeometry(innerR, outerR, 128);
  // Fix UVs so texture maps radially
  const pos = geo.attributes.position;
  const uv  = geo.attributes.uv;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const r = Math.sqrt(x*x + z*z);
    uv.setXY(i, (r - innerR) / (outerR - innerR), 0.5);
  }
  const mat = new THREE.MeshBasicMaterial({
    map: ringTex, side: THREE.DoubleSide,
    transparent: true, opacity,
    alphaTest: 0.01, depthWrite: false,
  });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = Math.PI / 2;
  return ring;
}

saturnObj.mesh.add(makeSaturnRing(3.2, 5.5,  0.85));
saturnObj.mesh.add(makeSaturnRing(5.6, 7.5,  0.45));

// ─────────────────────────────────────────────
//  Moon
// ─────────────────────────────────────────────
const earthObj  = planetObjects[2];
const moonPivot = new THREE.Object3D();
earthObj.mesh.add(moonPivot);

const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.27, 32, 32),
  new THREE.MeshPhongMaterial({ map: loader.load('texture/2k_moon.jpg'), shininess: 4 })
);
moonMesh.position.x = 2.5;
moonPivot.add(moonMesh);

// ─────────────────────────────────────────────
//  Controls (orbit camera — manual)
// ─────────────────────────────────────────────
let isDragging = false, isRightDrag = false;
let prevMouse  = { x: 0, y: 0 };
let camTheta   = -0.3, camPhi = 0.45, camDist = 145;

function updateCamera() {
  camera.position.set(
    camDist * Math.sin(camPhi) * Math.sin(camTheta),
    camDist * Math.cos(camPhi),
    camDist * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(0, 0, 0);
}
updateCamera();

const cvs = renderer.domElement;
cvs.addEventListener('mousedown', e => { isDragging = true; isRightDrag = e.button === 2; prevMouse = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup',   () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  prevMouse = { x: e.clientX, y: e.clientY };
  if (isRightDrag) {
    camDist = Math.max(20, Math.min(400, camDist - dy * 0.4));
  } else {
    camTheta -= dx * 0.005;
    camPhi    = Math.max(0.05, Math.min(Math.PI * 0.48, camPhi + dy * 0.005));
  }
  updateCamera();
});
cvs.addEventListener('wheel', e => {
  camDist = Math.max(20, Math.min(400, camDist + e.deltaY * 0.12));
  updateCamera();
});
cvs.addEventListener('contextmenu', e => e.preventDefault());

// ─────────────────────────────────────────────
//  Raycasting – click & hover
// ─────────────────────────────────────────────
const raycaster  = new THREE.Raycaster();
const mouse2d    = new THREE.Vector2();
const tooltip    = document.getElementById('tooltip');
const infoPanel  = document.getElementById('info-panel');

cvs.addEventListener('mousemove', e => {
  mouse2d.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse2d.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  if (hits.length) {
    const name = hits[0].object.userData.name;
    tooltip.style.display = 'block';
    tooltip.style.left    = (e.clientX + 14) + 'px';
    tooltip.style.top     = (e.clientY - 8)  + 'px';
    tooltip.textContent   = name;
    document.body.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    document.body.style.cursor = 'default';
  }
});

cvs.addEventListener('click', e => {
  mouse2d.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse2d.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  const hits = raycaster.intersectObjects(clickTargets);
  if (hits.length) {
    const d = hits[0].object.userData;
    document.getElementById('ip-name').textContent   = d.name;
    document.getElementById('ip-order').textContent  = d.order;
    document.getElementById('ip-period').textContent = d.period;
    document.getElementById('ip-dist').textContent   = d.dist;
    document.getElementById('ip-diam').textContent   = d.diam;
    infoPanel.style.display = 'block';
  } else {
    infoPanel.style.display = 'none';
  }
});

// ─────────────────────────────────────────────
//  UI controls
// ─────────────────────────────────────────────
let paused = false;
let speedMult = 1;
let showOrbits = true;

document.getElementById('btn-pause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? '▶ Resume' : '⏸ Pause';
  this.classList.toggle('on', paused);
});

document.getElementById('speedSlider').addEventListener('input', function() {
  speedMult = parseFloat(this.value);
});

document.getElementById('btn-top').addEventListener('click', () => {
  camTheta = 0; camPhi = 0.05; camDist = 200; updateCamera();
});
document.getElementById('btn-side').addEventListener('click', () => {
  camTheta = -0.3; camPhi = 0.45; camDist = 145; updateCamera();
});

document.getElementById('btn-orbits').addEventListener('click', function() {
  showOrbits = !showOrbits;
  this.textContent = showOrbits ? 'Orbits On' : 'Orbits Off';
  this.classList.toggle('on', showOrbits);
  planetObjects.forEach(p => p.ring.visible = showOrbits);
});

// ─────────────────────────────────────────────
//  Animation loop
// ─────────────────────────────────────────────
const BASE_SPEED = 0.0008; // base orbital speed scalar
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = paused ? 0 : clock.getDelta() * speedMult;

  // Orbit each planet
  planetObjects.forEach(p => {
    p.pivot.rotation.y += p.data.orbitSpd * BASE_SPEED * dt * 60;
    p.mesh.rotation.y  += p.data.axialSpd * 0.005  * dt * 60;
  });

  // Moon
  moonPivot.rotation.y += 0.012 * dt * 60;

  // Sun rotation
  sunMesh.rotation.y += 0.0006 * dt * 60;

  renderer.render(scene, camera);
}

animate();

// Hide hint after 6s
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 6000);
</script>
</body>
</html>
